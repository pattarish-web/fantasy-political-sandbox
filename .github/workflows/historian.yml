name: Historian novel chapter

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  historian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Verify Gemini keys in GitHub Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: |
          python - <<'PY'
          from app.config import get_api_keys
          keys = get_api_keys()
          if not keys:
              raise SystemExit(
                  "❌ ไม่พบ API key ใน GitHub Secrets\n"
                  "   ใส่ GEMINI_API_KEY (ตัวเดียว) หรือ GEMINI_API_KEY_1/2/3"
              )
          print(f"✓ พบ {len(keys)} key(s)")
          PY

      - name: Run historian
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/run_historian.py

      - name: Commit chronicle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world.db chronicle/
          git diff --staged --quiet || git commit -m "ci: new chronicle chapter [skip ci]"
          git push

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: chronicle

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
