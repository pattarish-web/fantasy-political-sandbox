name: Deploy chronicle to Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'chronicle/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: chronicle

      - uses: actions/deploy-pages@v4
