name: Reset world and republish

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RESET WORLD to confirm permanently replacing the current world state
        required: true
        type: string

concurrency:
  group: world-state
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  reset-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require reset confirmation
        if: ${{ inputs.confirmation != 'RESET WORLD' }}
        run: |
          echo "Reset cancelled: type RESET WORLD exactly."
          exit 1

      - name: Tag world backup before reset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          backup_tag="world-backup-$(date -u +%Y%m%dT%H%M%SZ)"
          git tag -a "$backup_tag" -m "World backup before reset"
          git push origin "$backup_tag"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Reset world state
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/reset_world.py

      - name: Commit reset world
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- data/world.db chronicle/
          if git ls-files --error-unmatch story_summary.json >/dev/null 2>&1; then
            git add -u -- story_summary.json
          fi
          git diff --staged --quiet || git commit -m "ci: reset world and republish [skip ci]"
          git push

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: chronicle

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
