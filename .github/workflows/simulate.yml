name: Simulate world rounds

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: Number of rounds
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Verify Gemini keys in GitHub Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: |
          python - <<'PY'
          from app.config import get_api_keys
          keys = get_api_keys()
          if not keys:
              raise SystemExit(
                  "❌ ไม่พบ API key ใน GitHub Secrets\n"
                  "   ใส่ GEMINI_API_KEY (ตัวเดียว) หรือ GEMINI_API_KEY_1/2/3 ใน\n"
                  "   Settings → Secrets and variables → Actions"
              )
          print(f"✓ พบ {len(keys)} key(s)")
          PY

      - name: Run simulation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/run_simulate.py --rounds ${{ inputs.rounds }}

      - name: Commit world state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world.db
          git diff --staged --quiet || git commit -m "ci: update world after simulate [skip ci]"
          git push
