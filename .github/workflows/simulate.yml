name: Simulate world rounds

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: Number of rounds
        required: true
        default: "1"

concurrency:
  group: world-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Verify Gemini keys in GitHub Secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          from app.config import get_api_keys, get_gemini_api_keys, get_openai_api_key
          keys = get_api_keys() or get_gemini_api_keys()
          openai_key = get_openai_api_key()
          if openai_key:
              keys.append(openai_key)
          if not keys:
              raise SystemExit(
                  "❌ ไม่พบ API key ใน GitHub Secrets\n"
                  "   ใส่ GROQ_API_KEY (ตัวเดียว) หรือ GROQ_API_KEY_1/2/3 ใน\n"
                  "   Settings → Secrets and variables → Actions"
              )
          print(f"✓ พบ {len(keys)} key(s)")
          PY

      - name: Run simulation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SIM_ROUNDS: ${{ inputs.rounds }}
        run: python scripts/run_simulate.py --rounds "$SIM_ROUNDS"

      - name: Commit world state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world.db
          git diff --staged --quiet || git commit -m "ci: update world after simulate [skip ci]"
          git push
