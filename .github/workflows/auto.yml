name: Auto Simulate and Write Novel

on:
  schedule:
    # Run at minute 0 past every hour (Cron format)
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: world-state
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  auto-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Simulation (3 times total)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/run_simulate.py --rounds 3

      - name: Write Novel Chapter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/run_historian.py

      - name: Commit and Push changes
        id: commit_step
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/world.db chronicle/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto: Simulated 3 rounds and wrote 1 chapter"
            git push
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        if: success() && steps.commit_step.outputs.HAS_CHANGES == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: success() && steps.commit_step.outputs.HAS_CHANGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: chronicle

      - name: Deploy to GitHub Pages
        if: success() && steps.commit_step.outputs.HAS_CHANGES == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
