name: Auto Simulate and Write Novel

on:
  schedule:
    # Run at minute 0 past every hour (Cron format)
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: world-state
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  auto-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Simulation (10 times total)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for i in {1..2}; do
            python -c "from app.simulation import run_simulation_batch; print(run_simulation_batch(5))"
          done

      - name: Write Novel Chapter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from app.historian import run_historian; print(run_historian())"

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/world.db chronicle/
          git commit -m "Auto: Simulated 10 rounds and wrote 1 chapter" || echo "No changes to commit"
          git push

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: chronicle

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
