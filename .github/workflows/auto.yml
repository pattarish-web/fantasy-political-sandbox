name: Auto Simulate and Write Novel

on:
  schedule:
    # Run at minute 0 past every hour (Cron format)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Simulation (10 times)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        run: |
          for i in {1..2}; do
            python -c "from app.simulation import run_simulation_batch; print(run_simulation_batch(5))"
          done

      - name: Write Novel Chapter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        run: python -c "from app.historian import run_historian; print(run_historian())"

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/world.db chronicle/
          git commit -m "Auto: Simulated 10 rounds and wrote 1 chapter" || echo "No changes to commit"
          git push
