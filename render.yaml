services:
  - type: web
    name: fantasy-political-sandbox
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app -b 0.0.0.0:$PORT
    disk:
      name: world-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: APP_PASSWORD
        sync: false
