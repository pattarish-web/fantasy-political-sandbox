services:
  - type: web
    name: fantasy-political-sandbox
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -c "from app.db import init_db; init_db()"
    startCommand: gunicorn wsgi:app -b 0.0.0.0:$PORT --workers 1 --timeout 120
    disk:
      name: world-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_PROVIDER
        value: groq
      - key: APP_PASSWORD
        sync: false
